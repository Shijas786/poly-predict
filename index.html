<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Polymarket Pulse · Intelligence Dashboard v2.1</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f1f5f9;--sf:#fff;--sf2:#f8fafc;--sf3:#f0f4f8;
  --bd:#e2e8f0;--bd2:#cbd5e1;
  --up:#059669;--up-l:#ecfdf5;--up-b:#a7f3d0;--up-d:#047857;
  --dn:#dc2626;--dn-l:#fef2f2;--dn-b:#fecaca;--dn-d:#b91c1c;
  --bl:#2563eb;--bl-l:#eff6ff;--bl-b:#bfdbfe;
  --go:#d97706;--go-l:#fffbeb;--go-b:#fde68a;
  --pu:#7c3aed;--pu-l:#f5f3ff;
  --tx:#0f172a;--tx2:#475569;--tx3:#94a3b8;--tx4:#cbd5e1;
  --mono:'JetBrains Mono',monospace;
  --sh:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --sh2:0 4px 12px rgba(0,0,0,.08);
  --r:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;font-size:13px;line-height:1.5}

/* NAV */
.nav{background:var(--sf);border-bottom:1px solid var(--bd);padding:0 24px;display:flex;align-items:center;gap:0;position:sticky;top:0;z-index:200;box-shadow:var(--sh)}
.nav-logo{font-weight:900;font-size:15px;padding-right:20px;border-right:1px solid var(--bd);margin-right:8px;color:var(--tx);white-space:nowrap}
.nav-logo span{color:var(--bl)}
.nav-tabs{display:flex;gap:0;overflow-x:auto;flex:1;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nt{padding:14px 16px;font-size:12px;font-weight:500;color:var(--tx2);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:all .12s;white-space:nowrap}
.nt:hover{color:var(--tx);background:var(--sf2)}
.nt.on{color:var(--bl);border-bottom-color:var(--bl);font-weight:700}
.nav-r{display:flex;align-items:center;gap:8px;margin-left:auto;padding-left:16px}
.live-badge{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:600;color:var(--up);background:var(--up-l);border:1px solid var(--up-b);padding:3px 8px;border-radius:20px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--up);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* PROGRESS */
.pbar-wrap{height:3px;background:var(--bd);position:sticky;top:49px;z-index:199}
.pbar{height:100%;background:linear-gradient(90deg,var(--bl),var(--up));width:0%;transition:width .3s}

/* CONTENT */
.content{padding:16px 24px 40px;max-width:1600px;margin:0 auto}
.sec{display:none}.sec.on{display:block}

/* STATUS */
.status-bar{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:8px 14px;display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap;box-shadow:var(--sh)}
.stxt{font-size:11px;color:var(--tx2);font-family:var(--mono);flex:1;min-width:200px}
.kpis{display:flex;gap:6px;flex-wrap:wrap}
.kpi{background:var(--sf2);border:1px solid var(--bd);border-radius:6px;padding:4px 12px;text-align:center;min-width:72px}
.kv{font-weight:700;font-size:16px;line-height:1.2;font-family:var(--mono)}
.kl{font-size:8.5px;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em}

/* TOOLBAR */
.tb{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.tbl{font-size:11px;color:var(--tx3);font-weight:500}
.btn{padding:4px 10px;font-size:11px;font-weight:500;background:var(--sf);border:1px solid var(--bd);border-radius:5px;color:var(--tx2);cursor:pointer;transition:all .12s;white-space:nowrap}
.btn:hover{border-color:var(--bl);color:var(--bl)}
.btn.on{background:var(--bl-l);border-color:var(--bl-b);color:var(--bl);font-weight:600}

/* STRATEGIES */
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:8px}
.sc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:all .15s;box-shadow:var(--sh)}
.sc:hover{border-color:var(--bl-b);box-shadow:var(--sh2);transform:translateY(-1px)}
.sc.open{border-color:var(--bl);border-left:3px solid var(--bl)}
.sch{padding:10px 12px;display:flex;align-items:flex-start;gap:8px}
.sc-tier{font-size:9.5px;font-weight:700;padding:2px 6px;border-radius:4px;flex-shrink:0;margin-top:1px;font-family:var(--mono)}
.tS{background:var(--go-l);color:var(--go);border:1px solid var(--go-b)}
.tA{background:var(--up-l);color:var(--up);border:1px solid var(--up-b)}
.tB{background:var(--bl-l);color:var(--bl);border:1px solid var(--bl-b)}
.tC{background:var(--sf2);color:var(--tx3);border:1px solid var(--bd)}
.sc-m{flex:1;min-width:0}
.sc-n{font-size:12px;font-weight:600;color:var(--tx)}
.sc-tags{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px}
.tag{font-size:8.5px;padding:1px 5px;border-radius:3px;font-weight:600}
.tv{background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe}
.tw{background:#ecfdf5;color:#059669;border:1px solid #a7f3d0}
.tp{background:#fffbeb;color:#d97706;border:1px solid #fde68a}
.ts{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.toc{background:#f5f3ff;color:#7c3aed;border:1px solid #ddd6fe}
.sc-r{text-align:right;flex-shrink:0}
.sc-wr{font-family:var(--mono);font-size:17px;font-weight:700;line-height:1}
.sc-wl{font-size:8.5px;color:var(--tx3);font-family:var(--mono)}
.sc-bar{margin:0 12px 5px;height:4px;background:var(--bd);border-radius:99px;overflow:hidden}
.sc-fill{height:100%;border-radius:99px;transition:width .8s}
.sc-desc{padding:0 12px 4px;font-size:10px;color:var(--tx2);line-height:1.5}
.sc-why{padding:0 12px 8px;font-size:9.5px;color:var(--pu);font-style:italic;line-height:1.4}
.sc-hist{display:none;border-top:1px solid var(--bd);max-height:200px;overflow-y:auto}
.sc.open .sc-hist{display:block}

/* TABLE */
.table-wrap{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--sf2);padding:10px 14px;text-align:left;font-weight:700;color:var(--tx3);text-transform:uppercase;font-size:10px;border-bottom:1px solid var(--bd);cursor:pointer}
th:hover{color:var(--tx)}
td{padding:10px 14px;border-bottom:1px solid var(--sf2);vertical-align:middle}
tr:last-child td{border-bottom:none}
.mono{font-family:var(--mono)}
.waddr{color:var(--bl);font-weight:600;cursor:pointer}
.waddr:hover{text-decoration:underline}

/* TAGS */
.tag-elite{background:var(--pu-l);color:var(--pu);border:1px solid #ddd6fe;font-size:8.5px;padding:1px 5px;border-radius:3px;font-weight:800;margin-left:4px}
</style>
</head>
<body>

<div class="nav">
  <div class="nav-logo">POLYMARKET <span>PULSE v2</span></div>
  <div class="nav-tabs">
    <button class="nt on" onclick="sw('strategies',this)">Strategies</button>
    <button class="nt" onclick="sw('wallets',this)">Wallets</button>
    <button class="nt" onclick="sw('buckets',this)">Buckets</button>
  </div>
  <div class="nav-r">
    <div class="live-badge"><div class="live-dot"></div> LIVE</div>
  </div>
</div>

<div class="pbar-wrap"><div class="pbar" id="prog"></div></div>

<div class="content">
  <div class="status-bar">
    <div class="stxt" id="status">Initializing...</div>
    <div class="kpis">
      <div class="kpi"><div class="kv" id="k-r">—</div><div class="kl">Rounds</div></div>
      <div class="kpi"><div class="kv" id="k-s">—</div><div class="kl">Strats</div></div>
      <div class="kpi"><div class="kv" id="k-b">—</div><div class="kl">Best WR</div></div>
    </div>
  </div>

  <div class="sec on" id="tab-strategies">
    <div class="tb">
      <span class="tbl">Filter:</span>
      <button class="btn on" onclick="sf(null,this)">All</button>
      <button class="btn" onclick="sf('vol',this)">Volume</button>
      <button class="btn" onclick="sf('price',this)">Price</button>
      <button class="btn" onclick="sf('wallet',this)">Wallet</button>
      <button class="btn" onclick="sf('time',this)">Time</button>
      <span class="tbl" style="margin-left:12px">Sort:</span>
      <button class="btn on" onclick="ss('wr',this)">Win Rate ↓</button>
      <button class="btn" onclick="ss('sig',this)">Signals</button>
    </div>
    <div class="sg" id="strat-grid"></div>
  </div>

  <div class="sec" id="tab-wallets">
    <div class="tb">
      <button class="btn" id="btn-elite" onclick="wEliteOnly=!wEliteOnly;this.classList.toggle('on');renderWallets()">Elite Retail (<$20k Portfolio)</button>
      <span class="tbl" style="margin-left:12px">Sort:</span>
      <button class="btn on" onclick="ws('wr',this)">Win Rate</button>
      <button class="btn" onclick="ws('port',this)">Portfolio Val</button>
    </div>
    <div class="table-wrap"><table>
      <thead><tr>
        <th>#</th><th>Wallet</th><th onclick="ws('wr')">Win Rate</th><th onclick="ws('port')">Portfolio</th>
        <th>Rounds</th><th>Type</th>
      </tr></thead>
      <tbody id="wtbody"></tbody>
    </table></div>
  </div>

  <div class="sec" id="tab-buckets">
    <div class="bg-grid" id="bucket-grid"></div>
  </div>
</div>

<script>
const RAILWAY_API='https://pp-pulse-api-production.up.railway.app';
const DA='https://data-api.polymarket.com',GA='https://gamma-api.polymarket.com';

let G={wallets:{},rounds:[],strats:[]};
let stratSort='wr',stratFilter=null,expId=null;
let wSort='wr',wEliteOnly=false;

// ── 95+ STRATEGIES ─────────────────────────────────────────────────────────────
const STRATS=[
// VOLUME (11)
{id:'v1',name:'Volume Dom. 80%',tags:['vol'],desc:'Side with >80% of buy volume.',why:'Overwhelming dominance.',sig:r=>{const t=r.uV+r.dV;if(t<50)return null;if(r.uV/t>.80)return'UP';if(r.dV/t>.80)return'DOWN';return null}},
{id:'v2',name:'Volume Dom. 70%',tags:['vol'],desc:'Side with >70% of buy volume.',why:'Strong momentum.',sig:r=>{const t=r.uV+r.dV;if(t<50)return null;if(r.uV/t>.70)return'UP';if(r.dV/t>.70)return'DOWN';return null}},
{id:'v3',name:'Volume Dom. 60%',tags:['vol'],desc:'Side with >60% of buy volume.',why:'Looser threshold.',sig:r=>{const t=r.uV+r.dV;if(t<40)return null;if(r.uV/t>.60)return'UP';if(r.dV/t>.60)return'DOWN';return null}},
{id:'v4',name:'Late Surge 60s',tags:['vol'],desc:'>65% of final 60s volume.',why:'Late capital is informed.',sig:r=>{const t=r.lU+r.lD;if(t<20)return null;if(r.lU/t>.65)return'UP';if(r.lD/t>.65)return'DOWN';return null}},
{id:'v5',name:'Late Surge 30s',tags:['vol'],desc:'>60% of final 30s volume.',why:'Last 30s entrants.',sig:r=>{const t=r.vlU+r.vlD;if(t<10)return null;if(r.vlU/t>.60)return'UP';if(r.vlD/t>.60)return'DOWN';return null}},
{id:'v6',name:'Velocity Spike 3x',tags:['vol'],desc:'Late rate 3x+ early rate.',why:'Acceleration.',sig:r=>{const eU=r.uV-r.lU,eD=r.dV-r.lD;if(r.lU>eU*3&&r.lU>30)return'UP';if(r.lD>eD*3&&r.lD>30)return'DOWN';return null}},
{id:'v7',name:'Retail Fade',tags:['vol'],desc:'Fade small trades (<$20) >70% one way.',why:'Retail is exit liquidity.',sig:r=>{const t=r.sU+r.sD;if(t<8)return null;if(r.sU/t>.70)return'DOWN';if(r.sD/t>.70)return'UP';return null}},
{id:'v8',name:'Opening Volume',tags:['vol'],desc:'Side dominating first 45s.',why:'Round opener bias.',sig:r=>{const t=r.earlyU+r.earlyD;if(t<15)return null;if(r.earlyU/t>.65)return'UP';if(r.earlyD/t>.65)return'DOWN';return null}},
{id:'v9',name:'Volume Divergence',tags:['vol'],desc:'High volume but price barely moved.',why:'Absorption.',sig:r=>{const t=r.uV+r.dV;if(t<100||Math.abs(r.upP-.5)<.15)return null;if(r.uV/t>.65&&r.upP<.55)return'DOWN';if(r.dV/t>.65&&r.upP>.45)return'UP';return null}},
{id:'v10',name:'Volume Mirroring',tags:['vol'],desc:'Follow previous round volume leader.',why:'Volume trends persist.',sig:(r,p,h)=>{const pr=h[h.length-1];if(!pr)return null;return pr.uV>pr.dV?'UP':'DOWN'}},
{id:'v11',name:'Inverse Vol Climax',tags:['vol'],desc:'Fade when volume is 10x average.',why:'Exhaustion.',sig:r=>r.uV+r.dV>200?r.uV>r.dV?'DOWN':'UP':null},

// MOMENTUM & REVERSAL (12)
{id:'m1',name:'3-Up Trend Follow',tags:['momentum'],desc:'UP after 3 consecutive UP closes.',why:'Strong momentum push.',sig:(r,p)=>p.slice(-3).every(x=>x==='UP')?'UP':null},
{id:'m2',name:'3-Down Trend Follow',tags:['momentum'],desc:'DOWN after 3 consecutive DOWN closes.',why:'Downward cascade.',sig:(r,p)=>p.slice(-3).every(x=>x==='DOWN')?'DOWN':null},
{id:'m3',name:'Rubber Band 4',tags:['reversal'],desc:'Fade after 4 same direction.',why:'Statistical exhaustion.',sig:(r,p)=>{const l=p.slice(-4);if(l.every(x=>x==='UP'))return'DOWN';if(l.every(x=>x==='DOWN'))return'UP';return null}},
{id:'m4',name:'Volatility Squeeze',tags:['vol'],desc:'Bet after 3 rounds of <$10k volume.',why:'Explosive breakouts.',sig:(r,p)=>{const t=r.uV+r.dV;if(t>10)return null;return r.upP>.5?'UP':'DOWN'}},
{id:'m5',name:'UP Washout Reversal',tags:['reversal'],desc:'DOWN after 95¢ then drop to 85¢.',why:'Blow-off tops.',sig:r=>r.upP>.80&&r.uV>50?'DOWN':null},
{id:'m6',name:'DOWN Washout Reversal',tags:['reversal'],desc:'UP after 5¢ then bounce to 15¢.',why:'Capitulation bottoms.',sig:r=>r.upP<.20&&r.dV>50?'UP':null},
{id:'m7',name:'The Pin-Bar 5m',tags:['price'],desc:'Bet opposite of extreme early price.',why:'Fakeout wicks.',sig:r=>r.upP>.85?'DOWN':r.upP<.15?'UP':null},
{id:'m8',name:'Volume Divergence UP',tags:['vol'],desc:'UP price falling but volume up.',why:'Hidden accumulation.',sig:r=>r.upP<.45&&r.uV>r.dV*2?'UP':null},
{id:'m9',name:'Volume Divergence DOWN',tags:['vol'],desc:'UP price rising but dV up.',why:'Hidden distribution.',sig:r=>r.upP>.55&&r.dV>r.uV*2?'DOWN':null},
{id:'m10',name:'Round Number Bias',tags:['price'],desc:'Bet against 50¢ precisely.',why:'Equilibrium trap.',sig:r=>r.upP===.50?Math.random()>.5?'UP':'DOWN':null},
{id:'m11',name:'Step-Climb UP',tags:['momentum'],desc:'UP if 2 last UP and price rising.',why:'Orderly trend.',sig:(r,p)=>p.slice(-2).every(x=>x==='UP')&&r.upP>.60?'UP':null},
{id:'m12',name:'Step-Climb DOWN',tags:['momentum'],desc:'DOWN if 2 last DOWN and price falling.',why:'Orderly trend.',sig:(r,p)=>p.slice(-2).every(x=>x==='DOWN')&&r.upP<.40?'DOWN':null},

// PRICE (13)
{id:'p1',name:'DOWN Value 50-60¢',tags:['price'],desc:'DOWN when UP is 50-60¢.',why:'Bullish bias overpricing.',sig:r=>r.upP>.50&&r.upP<=.60?'DOWN':null},
{id:'p2',name:'DOWN Value 60-70¢',tags:['price'],desc:'DOWN when UP is 60-70¢.',why:'Retail bias push.',sig:r=>r.upP>.60&&r.upP<=.70?'DOWN':null},
{id:'p3',name:'DOWN Value 70-80¢',tags:['price'],desc:'DOWN when UP is 70-80¢.',why:'Core inefficiency.',sig:r=>r.upP>.70&&r.upP<=.80?'DOWN':null},
{id:'p4',name:'DOWN Deep Value 80-90¢',tags:['price'],desc:'DOWN when UP is 80-90¢.',why:'Market overestimates UP.',sig:r=>r.upP>.80&&r.upP<=.90?'DOWN':null},
{id:'p5',name:'DOWN Extreme 90¢+',tags:['price'],desc:'DOWN when UP >90¢.',why:'Extreme overconfidence.',sig:r=>r.upP>.90?'DOWN':null},
{id:'p6',name:'UP Value <30¢',tags:['price'],desc:'UP when UP is <30¢.',why:'Contrarian buy.',sig:r=>r.upP<.30?'UP':null},
{id:'p7',name:'Price Compression',tags:['price'],desc:'Both near 50¢ — bet volume.',why:'Indecision break.',sig:r=>{if(r.upP<.44||r.upP>.56)return null;return r.uV>r.dV?'UP':'DOWN'}},
{id:'p8',name:'Extreme Contrarian',tags:['price'],desc:'Fade when UP>85¢ or UP<15¢.',why:'Mean reversion.',sig:r=>r.upP>.85?'DOWN':r.upP<.15?'UP':null},
{id:'p9',name:'EV Calculator',tags:['price'],desc:'Positive EV based on WR.',why:'Pure math edge.',sig:r=>{const p=r.upP;const uw=p<.3?.22:p<.5?.44:p<.7?.55:p<.9?.63:.66;const ue=uw*(1/p)-1,de=(1-uw)*(1/(1-p))-1;if(ue>.12)return'UP';if(de>.12)return'DOWN';return null}},
{id:'p10',name:'DOWN Value >70¢',tags:['price'],desc:'DOWN whenever UP > 70¢.',why:'Statistical bias.',sig:r=>r.upP>.70?'DOWN':null},
{id:'p11',name:'DOWN Value >75¢',tags:['price'],desc:'DOWN when UP >75¢.',why:'Peak inefficiency.',sig:r=>r.upP>.75?'DOWN':null},
{id:'p12',name:'Mean Reversion 10r',tags:['price'],desc:'Fade after 20¢ dev from avg.',why:'Regression.',sig:(r,p,h)=>{if(h.length<10)return null;const avg=h.slice(-10).reduce((a,b)=>a+b.uP,0)/10;if(r.uP>avg+.20)return'DOWN';if(r.uP<avg-.20)return'UP';return null}},
{id:'p13',name:'Volatility Squeeze Play',tags:['price'],desc:'Breakout after $2k total vol.',why:'Breakout momentum.',sig:(r,p,h)=>{const pr=h[h.length-1];if(!pr||pr.uV+pr.dV>2)return null;return r.uP>.55?'UP':r.uP<.45?'DOWN':null}},

// HYBRID (10)
{id:'h1',name:'Whale-Price Div',tags:['hybrid'],desc:'Whales buying UP but price <40¢.',why:'Absorption.',sig:r=>r.upP<.40&&r.wCntU>=2?'UP':null},
{id:'h2',name:'Retail Trap Fade',tags:['hybrid'],desc:'90% retail but price flat.',why:'Smart absorption.',sig:r=>{const t=r.uV+r.dV;if(r.uV/t>.85&&r.upP<.60)return'DOWN';if(r.dV/t>.85&&r.upP>.40)return'UP';return null}},
{id:'h3',name:'Late Whale Entry',tags:['hybrid'],desc:'Whale entry final 30s.',why:'Informed money.',sig:r=>r.excU>=1&&r.upP>.70?'UP':r.excD>=1&&r.upP<.30?'DOWN':null},
{id:'h4',name:'Streak Follow',tags:['hybrid'],desc:'Follow top WR during streaks.',why:'Hot hands.',sig:r=>r.t10U>r.t10D&&r.upP>.55?'UP':r.t10D>r.t10U&&r.upP<.45?'DOWN':null},
{id:'h5',name:'PnL Leader Fade',tags:['hybrid'],desc:'Fade leader if >10% vol.',why:'Hunted whales.',sig:r=>r.p10U>r.uV*.10?'DOWN':r.p10D>r.dV*.10?'UP':null},
{id:'h6',name:'Oracle Consolidation',tags:['hybrid'],desc:'All 5 oracles agree.',why:'100% consensus.',sig:r=>r.orU>=5?'UP':r.orD>=5?'DOWN':null},
{id:'h7',name:'Timing-Vol Hybrid',tags:['hybrid'],desc:'NYSE open + Whale vol.',why:'Max volatility.',sig:r=>{const d=new Date(r.ts*1000);if(d.getHours()!==19)return null;return r.wCntU>=2?'UP':null}},
{id:'h8',name:'Contrarian Action',tags:['hybrid'],desc:'UP price drop + uV high.',why:'Buying dips.',sig:r=>r.upP<.35&&r.uV>r.dV*1.5?'UP':null},
{id:'h9',name:'Institutional Wall',tags:['hybrid'],desc:'$1k+ trade at extremes.',why:'Level defense.',sig:r=>r.wCntU>=1&&r.upP<.20?'UP':r.wCntD>=1&&r.upP>.80?'DOWN':null},
{id:'h10',name:'Capitulation absorption',tags:['hybrid'],desc:'Retail sellers high but flat price.',why:'Absorbing panic.',sig:r=>r.sD/r.dV>.80&&r.upP>.40?'UP':null},

// WALLET (14)
{id:'w1',name:'Top 10 WR Follow',tags:['wallet'],desc:'Follow 10 best WR.',why:'Elite wallets.',sig:r=>{const t=r.t10U+r.t10D;if(t<20)return null;return r.t10U/t>.60?'UP':r.t10D/t>.60?'DOWN':null}},
{id:'w2',name:'Top 20 WR Follow',tags:['wallet'],desc:'Follow 20 best WR.',why:'Stable signal.',sig:r=>{const t=r.t20U+r.t20D;if(t<30)return null;return r.t20U/t>.60?'UP':r.t20D/t>.60?'DOWN':null}},
{id:'w3',name:'Top 10 PnL Follow',tags:['wallet'],desc:'Follow 10 best PnL.',why:'Profit leaders.',sig:r=>{const t=r.p10U+r.p10D;if(t<20)return null;return r.p10U/t>.60?'UP':r.p10D/t>.60?'DOWN':null}},
{id:'w5',name:'Oracle Wallet Follow',tags:['wallet'],desc:'Follow late-winning oracles.',why:'Near-oracle timing.',sig:r=>{const t=r.orU+r.orD;if(t<10)return null;return r.orU>r.orD?'UP':'DOWN'}},
{id:'w6',name:'Whale Coordination 3+',tags:['wallet'],desc:'3+ whales same side.',why:'Group conviction.',sig:r=>r.wCntU>=3?'UP':r.wCntD>=3?'DOWN':null},
{id:'w7',name:'Manipulator Fade',tags:['wallet'],desc:'Fade early high-WR.',why:'Pump & rotation.',sig:r=>{const t=r.mU+r.mD;if(t<10)return null;return r.mU>r.mD?'DOWN':'UP'}},

// ── ENGINE ─────────────────────────────────────────────────────────────────────
async function buildWallets(evs){
  const W={};let done=0;
  await Promise.all(evs.map(async ev=>{
    try{
      const m=ev.markets?.[0];if(!m)return;
      const prices=JSON.parse(m.outcomePrices||'[]');
      let oc=prices[0]>.9?'UP':prices[1]>.9?'DOWN':null;
      if(!oc)return;
      const slug=ev.slug,rTs=parseInt(slug.split('-').pop())||0;
      const trades=await fetch(`${DA}/trades?market=${slug}&limit=400&_=${Date.now()}`).then(r=>r.json()).catch(()=>[]);
      if(!Array.isArray(trades))return;
      trades.filter(t=>t.side==='BUY').forEach(t=>{
        const addr=t.proxyWallet||'';if(!addr)return;
        if(!W[addr])W[addr]={addr,wins:0,losses:0,rounds:0,vol:0,pnl:0,timings:[],lateVol:0,lateWins:0,lateR:0,byPrice:{},wr:0};
        const w=W[addr],vol=t.size||0,won=(t.outcome.toLowerCase()==='up'?'UP':'DOWN')===oc;
        w.rounds++;w.vol+=vol;if(won){w.wins++;w.pnl+=vol*(1/t.price-1);}else{w.losses++;w.pnl-=vol;}
        w.timings.push(t.timestamp-rTs);
        if(t.timestamp>=(rTs+240)){w.lateVol+=vol;w.lateR++;if(won)w.lateWins+=vol;}
      });
    }catch{}
    done++;setP(done/evs.length*40);
  }));
  Object.values(W).forEach(w=>{const tot=w.wins+w.losses;w.wr=tot>0?Math.round(w.wins/tot*100):0;w.avgTiming=w.timings.length?Math.round(w.timings.reduce((a,b)=>a+b,0)/w.timings.length):0;w.lateWr=w.lateR>0?Math.round(w.lateWins/w.lateVol*100):0;w.avgSize=w.vol/w.rounds;});
  return W;
}

async function fetchRound(ev,W){
  try{
    const m=ev.markets?.[0];if(!m)return null;
    const condId=m.conditionId; if(!condId) return null;
    const prices=JSON.parse(m.outcomePrices||'[]');
    let oc=prices[0]>.9?'UP':prices[1]>.9?'DOWN':null;if(!oc)return null;
    const uP=parseFloat(prices[0])||.5,slug=ev.slug,rTs=parseInt(slug.split('-').pop())||0,rEnd=rTs+300;
    const t60=rEnd-60,t30=rEnd-30,t45=rTs+45,t90=rTs+90,t210=rTs+210;
    const trades=await fetch(`${DA}/trades?market=${condId}&limit=400&takerOnly=true&_=${Date.now()}`).then(r=>r.json()).catch(()=>[]);
    if(!Array.isArray(trades))return null;
    let uV=0,dV=0,lU=0,lD=0,vlU=0,vlD=0,sU=0,sD=0,earlyU=0,earlyD=0,t10U=0,t10D=0,orU=0,orD=0,wCntU=0,wCntD=0,mU=0,mD=0,midU=0,midD=0,scalU=0,scalD=0,excU=0,excD=0,newU=0,newD=0;
    const uwsU=new Set(),uwsD=new Set();
    const t10=Object.values(W).sort((a,b)=>b.wr-a.wr).slice(0,10).map(x=>x.addr);
    const oracles=Object.values(W).filter(w=>w.lateWr>=70&&w.lateR>=3).map(x=>x.addr);
    let valid=trades.filter(t=>t.side==='BUY');
    valid.forEach(t=>{
      const vol=t.size||0,isU=t.outcome.toLowerCase()==='up',ts=t.timestamp||0,addr=t.proxyWallet||'';
      if(isU){uV+=vol;uwsU.add(addr);if(ts>=t60)lU+=vol;if(ts>=t30)vlU+=vol;if(vol<20)sU+=vol;if(ts<=t45)earlyU+=vol;}
      else{dV+=vol;uwsD.add(addr);if(ts>=t60)lD+=vol;if(ts>=t30)vlD+=vol;if(vol<20)sD+=vol;if(ts<=t45)earlyD+=vol;}
      if(t10.includes(addr)){if(isU)t10U+=vol;else t10D+=vol;}
      if(oracles.includes(addr)){if(isU)orU++;else orD++;}
      if(vol>=500){if(isU)wCntU++;else wCntD++;}
      if(ts>=t90&&ts<=t210){if(isU)midU+=vol;else midD+=vol;}
    });
    return {slug,oc,upP:uP,ts:rTs,date:new Date(rTs*1000),uV,dV,lU,lD,vlU,vlD,sU,sD,earlyU,earlyD,t10U,t10D,orU,orD,wCntU,wCntD,midU,midD,uwU:uwsU.size,uwD:uwsD.size};
  }catch(e){console.error('fetchRound err:',e);return null;}
}

async function fetchPortfolios(wallets) {
  const top = Object.values(wallets).filter(w => w.rounds >= 3 && w.wr >= 60).sort((a, b) => b.wr - a.wr).slice(0, 100);
  let done = 0;
  await Promise.all(top.map(async w => {
    try {
      const resp = await fetch(`${DA}/value?user=${w.addr}`);
      if (resp.ok) { const data = await resp.json(); w.portfolio = data.value || 0; }
    } catch(e) {}
    done++; setStatus(`Syncing portfolios: ${Math.round(done/top.length*100)}%`);
  }));
}

async function init(){
  setStatus('Loading...');setP(0);
  let db=[];
  try {
    db=await fetch(`${RAILWAY_API}/rounds`).then(r=>r.json()).catch(()=>[]);
  } catch(e) {
    console.error('Railway fetch failed:', e);
    setStatus('⚠️ Railway API Offline (CORS or Down)');
  }
  const liveEvs=await fetch(`${GA}/events?series_slug=btc-updown-5m&closed=true&limit=100&order=endDate&ascending=false`).then(r=>r.json()).catch(()=>[]);
  if(!liveEvs.length) { setStatus('❌ No rounds found on Polymarket API'); return; }
  const liveRes=liveEvs.filter(ev=>{const m=ev.markets?.[0];if(!m)return false;const p=JSON.parse(m.outcomePrices||'[]');return p[0]>.9||p[1]>.9;}).slice(0,80);
  const wc=await buildWallets(liveRes); G.wallets=wc;
  const rs=[]; for(let i=0;i<liveRes.length;i++){const r=await fetchRound(liveRes[i],wc);if(r)rs.push(r);setP(40+(i/liveRes.length*40));}
  G.rounds=rs.sort((a,b)=>a.ts-b.ts);
  await fetchPortfolios(wc);
  G.strats=STRATS.map(st=>{
    const ts=[]; G.rounds.forEach((r,i)=>{const sig=st.sig(r,G.rounds.slice(0,i).map(x=>x.oc),G.rounds.slice(0,i));const result=sig===null?'skip':sig===r.oc?'win':'loss';ts.push({time:r.date.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),sig,oc:r.oc,result,uP:r.upP});});
    const s=ts.filter(x=>x.result!=='skip'),w=s.filter(x=>x.result==='win').length,wr=s.length?Math.round(w/s.length*100):0;
    return{...st,trades:ts,wins:w,losses:s.length-w,signals:s.length,wr,tier:wr>=75?'S':wr>=62?'A':wr>=50?'B':'C'};
  });
  document.getElementById('k-r').textContent=db.length||rs.length;
  document.getElementById('k-s').textContent=G.strats.length;
  document.getElementById('k-b').textContent=Math.max(...G.strats.map(s=>s.wr))+'%';
  setP(100); setStatus('✅ Intelligence ready');
  renderStrategies();renderWallets();renderBuckets();
}

// ── UI ────────────────────────────────────────────────────────────────────────
function renderStrategies(){
  let d=[...G.strats];if(stratFilter)d=d.filter(s=>s.tags.includes(stratFilter));
  if(stratSort==='wr')d.sort((a,b)=>b.wr-a.wr);else d.sort((a,b)=>b.signals-a.signals);
  const g=document.getElementById('strat-grid');g.innerHTML='';
  d.forEach(s=>{
    const col=s.wr>=75?'var(--go)':s.wr>=62?'var(--up)':s.wr>=50?'var(--bl)':'var(--tx3)';
    const c=document.createElement('div');c.className='sc'+(expId===s.id?' open':'');c.dataset.id=s.id;
    c.innerHTML=`<div class="sch"><span class="sc-tier t${s.tier}">${s.tier}</span><div class="sc-m"><div class="sc-n">${s.name}</div><div class="sc-tags">${s.tags.map(t=>`<span class="tag tv">${t}</span>`).join('')}</div></div><div class="sc-r"><div class="sc-wr" style="color:${col}">${s.signals?s.wr+'%':''}</div><div class="sc-wl">${s.wins}W·${s.losses}L</div></div></div><div class="sc-bar"><div class="sc-fill" style="width:${s.wr}%;background:${col}"></div></div><div class="sc-desc">${s.desc}</div>`;
    c.onclick=()=>{expId=expId===s.id?null:s.id;renderStrategies();};g.appendChild(c);
  });
}

function renderWallets(){
  let d=Object.values(G.wallets).filter(w=>w.rounds>=3);
  if(wEliteOnly)d=d.filter(w=>w.portfolio!==undefined&&w.portfolio<20000&&w.wr>=60);
  if(wSort==='wr')d.sort((a,b)=>b.wr-a.wr);else d.sort((a,b)=>(b.portfolio||0)-(a.portfolio||0));
  const tb=document.getElementById('wtbody');tb.innerHTML='';
  d.slice(0,100).forEach((w,i)=>{
    const name=w.addr.slice(0,6)+'…'+w.addr.slice(-4);
    const isElite=w.portfolio!==undefined&&w.portfolio<20000&&w.wr>=60;
    tb.innerHTML+=`<tr><td class="mono">${i+1}</td><td class="waddr" onclick="window.open('https://polymarket.com/profile/${w.addr}')">${name}</td><td class="mono" style="color:var(--up);font-weight:700">${w.wr}%</td><td class="mono">$${w.portfolio!==undefined?Math.round(w.portfolio).toLocaleString():'—'}</td><td class="mono">${w.rounds}</td><td>${isElite?'<span class="tag-elite">ELITE RETAIL</span>':'👤'}</td></tr>`;
  });
}

function renderBuckets(){
  const g=document.getElementById('bucket-grid');g.innerHTML='';
  [0,.5,.6,.7,.8,.9].forEach(min=>{
    const rs=G.rounds.filter(r=>r.upP>=min&&r.upP<(min===0?.5:min+.1));if(!rs.length)return;
    const uW=rs.filter(r=>r.oc==='UP').length;
    g.innerHTML+=`<div class="bc"><div class="bc-head"><div class="bc-title">${min*100}%+ UP</div><div>${rs.length}r</div></div><div class="bc-body"><div style="font-weight:700;color:var(--up);text-align:center">${Math.round(uW/rs.length*100)}% Win</div></div></div>`;
  });
}

function sw(id,btn){document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));document.querySelectorAll('.nt').forEach(t=>t.classList.remove('on'));document.getElementById('tab-'+id).classList.add('on');btn.classList.add('on');}
function sf(f,b){stratFilter=f;document.querySelectorAll('#tab-strategies .btn').forEach(x=>x.classList.remove('on'));b.classList.add('on');renderStrategies();}
function ss(k,b){stratSort=k;document.querySelectorAll('#tab-strategies .btn').forEach(x=>x.classList.remove('on'));b.classList.add('on');renderStrategies();}
function ws(k,b){wSort=k;if(b){document.querySelectorAll('#tab-wallets .btn').forEach(x=>x.classList.remove('on'));b.classList.add('on');}renderWallets();}

function setStatus(t){document.getElementById('status').textContent=t;}
function setP(p){document.getElementById('prog').style.width=p+'%';}

window.addEventListener('load',init);
</script>
