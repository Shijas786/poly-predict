<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Polymarket Pulse · Intelligence Dashboard v2</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f1f5f9;--sf:#fff;--sf2:#f8fafc;--sf3:#f0f4f8;
  --bd:#e2e8f0;--bd2:#cbd5e1;
  --up:#059669;--up-l:#ecfdf5;--up-b:#a7f3d0;--up-d:#047857;
  --dn:#dc2626;--dn-l:#fef2f2;--dn-b:#fecaca;--dn-d:#b91c1c;
  --bl:#2563eb;--bl-l:#eff6ff;--bl-b:#bfdbfe;
  --go:#d97706;--go-l:#fffbeb;--go-b:#fde68a;
  --pu:#7c3aed;--pu-l:#f5f3ff;
  --tx:#0f172a;--tx2:#475569;--tx3:#94a3b8;--tx4:#cbd5e1;
  --mono:'JetBrains Mono',monospace;
  --sh:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --sh2:0 4px 12px rgba(0,0,0,.08);
  --r:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;font-size:13px;line-height:1.5}

/* NAV */
.nav{background:var(--sf);border-bottom:1px solid var(--bd);padding:0 24px;display:flex;align-items:center;gap:0;position:sticky;top:0;z-index:200;box-shadow:var(--sh)}
.nav-logo{font-weight:900;font-size:15px;padding-right:20px;border-right:1px solid var(--bd);margin-right:8px;color:var(--tx);white-space:nowrap}
.nav-logo span{color:var(--bl)}
.nav-tabs{display:flex;gap:0;overflow-x:auto;flex:1;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nt{padding:14px 16px;font-size:12px;font-weight:500;color:var(--tx2);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:all .12s;white-space:nowrap}
.nt:hover{color:var(--tx);background:var(--sf2)}
.nt.on{color:var(--bl);border-bottom-color:var(--bl);font-weight:700}
.nav-r{display:flex;align-items:center;gap:8px;margin-left:auto;padding-left:16px}
.live-badge{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:600;color:var(--up);background:var(--up-l);border:1px solid var(--up-b);padding:3px 8px;border-radius:20px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--up);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* PROGRESS */
.pbar-wrap{height:3px;background:var(--bd);position:sticky;top:49px;z-index:199}
.pbar{height:100%;background:linear-gradient(90deg,var(--bl),var(--up));width:0%;transition:width .3s}

/* CONTENT */
.content{padding:16px 24px 40px;max-width:1600px;margin:0 auto}
.sec{display:none}.sec.on{display:block}

/* STATUS */
.status-bar{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:8px 14px;display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap;box-shadow:var(--sh)}
.stxt{font-size:11px;color:var(--tx2);font-family:var(--mono);flex:1;min-width:200px}
.kpis{display:flex;gap:6px;flex-wrap:wrap}
.kpi{background:var(--sf2);border:1px solid var(--bd);border-radius:6px;padding:4px 12px;text-align:center;min-width:72px}
.kv{font-weight:700;font-size:16px;line-height:1.2;font-family:var(--mono)}
.kl{font-size:8.5px;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em}

/* TOOLBAR */
.tb{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.tbl{font-size:11px;color:var(--tx3);font-weight:500}
.btn{padding:4px 10px;font-size:11px;font-weight:500;background:var(--sf);border:1px solid var(--bd);border-radius:5px;color:var(--tx2);cursor:pointer;transition:all .12s;white-space:nowrap}
.btn:hover{border-color:var(--bl);color:var(--bl)}
.btn.on{background:var(--bl-l);border-color:var(--bl-b);color:var(--bl);font-weight:600}

/* STRATEGIES */
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:8px}
.sc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:all .15s;box-shadow:var(--sh)}
.sc:hover{border-color:var(--bl-b);box-shadow:var(--sh2);transform:translateY(-1px)}
.sc.open{border-color:var(--bl);border-left:3px solid var(--bl)}
.sch{padding:10px 12px;display:flex;align-items:flex-start;gap:8px}
.sc-tier{font-size:9.5px;font-weight:700;padding:2px 6px;border-radius:4px;flex-shrink:0;margin-top:1px;font-family:var(--mono)}
.tS{background:var(--go-l);color:var(--go);border:1px solid var(--go-b)}
.tA{background:var(--up-l);color:var(--up);border:1px solid var(--up-b)}
.tB{background:var(--bl-l);color:var(--bl);border:1px solid var(--bl-b)}
.tC{background:var(--sf2);color:var(--tx3);border:1px solid var(--bd)}
.sc-m{flex:1;min-width:0}
.sc-n{font-size:12px;font-weight:600;color:var(--tx)}
.sc-tags{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px}
.tag{font-size:8.5px;padding:1px 5px;border-radius:3px;font-weight:600}
.tv{background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe}
.tw{background:#ecfdf5;color:#059669;border:1px solid #a7f3d0}
.tp{background:#fffbeb;color:#d97706;border:1px solid #fde68a}
.ts{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.toc{background:#f5f3ff;color:#7c3aed;border:1px solid #ddd6fe}
.sc-r{text-align:right;flex-shrink:0}
.sc-wr{font-family:var(--mono);font-size:17px;font-weight:700;line-height:1}
.sc-wl{font-size:8.5px;color:var(--tx3);font-family:var(--mono)}
.sc-bar{margin:0 12px 5px;height:4px;background:var(--bd);border-radius:99px;overflow:hidden}
.sc-fill{height:100%;border-radius:99px;transition:width .8s}
.sc-desc{padding:0 12px 4px;font-size:10px;color:var(--tx2);line-height:1.5}
.sc-why{padding:0 12px 8px;font-size:9.5px;color:var(--pu);font-style:italic;line-height:1.4}
.sc-hist{display:none;border-top:1px solid var(--bd);max-height:200px;overflow-y:auto}
.sc.open .sc-hist{display:block}
.sh-hdr{display:grid;grid-template-columns:40px 32px 32px 1fr 46px;gap:4px;padding:5px 12px;background:var(--sf2);font-size:8.5px;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em;font-weight:600;border-bottom:1px solid var(--bd);font-family:var(--mono)}
.sh-row{display:grid;grid-template-columns:40px 32px 32px 1fr 46px;gap:4px;padding:3px 12px;border-bottom:1px solid var(--sf2);font-family:var(--mono);font-size:9.5px;align-items:center}
.sh-row:hover{background:var(--sf2)}.sh-row:last-child{border:none}
.win{color:var(--up);font-weight:700}.loss{color:var(--dn);font-weight:700}.skip-c{color:var(--tx3)}

/* CALENDAR */
.cal-wrap{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);display:flex;flex-direction:column;min-height:700px;box-shadow:var(--sh)}
.cal-h{padding:16px 24px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.cal-title{font-size:18px;font-weight:800;letter-spacing:-0.01em}
.cal-nav{display:flex;gap:6px}
.cal-grid-wrap{display:flex;flex:1;overflow:hidden}
.cal-sidebar{width:280px;border-right:1px solid var(--bd);background:var(--sf2);display:flex;flex-direction:column}
.cal-sb-h{padding:12px 16px;border-bottom:1px solid var(--bd);font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:0.05em}
.cal-sb-search{padding:10px 16px;border-bottom:1px solid var(--bd)}
.cal-sb-search input{width:100%;padding:6px 10px;border:1px solid var(--bd);border-radius:6px;font-size:12px;outline:none}
.cal-sb-list{flex:1;overflow-y:auto;padding:8px 0}
.cal-sb-group{padding:10px 16px 4px;font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase}
.cal-sb-item{padding:8px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all 0.1s}
.cal-sb-item:hover{background:var(--sf3)}
.cal-sb-item.on{background:var(--bl-l);border-right:3px solid var(--bl)}
.cal-sb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cal-sb-item span{font-size:12px;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-sb-wr{font-family:var(--mono);font-size:11px;font-weight:700}
.cal-main{flex:1;display:flex;flex-direction:column}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);background:var(--sf2);border-bottom:1px solid var(--bd)}
.cal-day-label{padding:10px;text-align:center;font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase}
.cal-cells{display:grid;grid-template-columns:repeat(7,1fr);flex:1}
.cc{border-right:1px solid var(--bd);border-bottom:1px solid var(--bd);padding:8px;min-height:100px;display:flex;flex-direction:column;gap:4px;cursor:pointer;transition:all 0.1s;position:relative}
.cc:nth-child(7n){border-right:none}
.cc:hover{background:var(--sf2)}
.cc.empty{background:var(--sf3);cursor:default}
.cc.today{border:2px solid var(--bl);z-index:10}
.cc.sel{background:var(--bl-l)}
.cc.no-data{opacity:0.5}
.cc-day{font-size:11px;font-weight:700;color:var(--tx3)}
.today-num{color:var(--bl);font-weight:900}
.cc-bars{height:4px;border-radius:2px;overflow:hidden;display:flex;margin-top:auto}
.cc-bar-up{background:var(--up)}
.cc-bar-dn{background:var(--dn)}
.cc-rounds{display:flex;flex-wrap:wrap;gap:2px;margin-top:4px}
.cc-r{width:5px;height:5px;border-radius:50%}
.cc-r.up{background:var(--up)}
.cc-r.down{background:var(--dn)}
.cc-stats{font-size:9px;font-weight:600;color:var(--tx3);margin-top:4px}
.cc-strat{font-size:9px;font-weight:700;padding:2px 4px;border-radius:3px;text-align:center;margin-top:2px}
.s-win{background:var(--up-l);color:var(--up)}
.s-loss{background:var(--dn-l);color:var(--dn)}
.s-skip{background:var(--sf3);color:var(--tx3)}

/* TABLE */
.table-wrap{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--sf2);padding:10px 14px;text-align:left;font-weight:700;color:var(--tx3);text-transform:uppercase;font-size:10px;border-bottom:1px solid var(--bd);cursor:pointer}
th:hover{color:var(--tx)}
td{padding:10px 14px;border-bottom:1px solid var(--sf2);vertical-align:middle}
tr:last-child td{border-bottom:none}
.mono{font-family:var(--mono)}
.waddr{color:var(--bl);font-weight:600;cursor:pointer}
.waddr:hover{text-decoration:underline}

/* DAY PANEL */
.day-panel{padding:16px;background:var(--sf);border-top:1px solid var(--bd)}
.dp-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.dp-title{font-size:16px;font-weight:800}
.dp-summary{display:flex;gap:20px}
.dp-stat{text-align:center}
.dp-sv{font-size:18px;font-weight:800;line-height:1}
.dp-sl{font-size:9px;color:var(--tx3);text-transform:uppercase;margin-top:2px}
.dp-timeline{margin-bottom:12px;overflow-x:auto;padding-bottom:8px}
.dp-tl-inner{display:flex;gap:4px}
.dp-tl-block{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:32px}
.dp-tl-bar{width:100%;height:24px;border-radius:4px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:11px}
.dp-tl-bar.up{background:var(--up)}
.dp-tl-bar.down{background:var(--dn)}
.dp-tl-time{font-size:8.5px;color:var(--tx3);font-family:var(--mono)}
.dp-rounds{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:6px}
.dp-round{padding:6px 10px;border-radius:6px;display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;font-weight:600}
.dpr-up{background:var(--up-l);color:var(--up-d);border:1px solid var(--up-b)}
.dpr-down{background:var(--dn-l);color:var(--dn-d);border:1px solid var(--dn-b)}
.dp-strat-result{font-size:10px;margin-left:4px}
.dsr-w{color:var(--up)}
.dsr-l{color:var(--dn)}
.dp-close{padding:4px 8px;border:none;background:var(--sf2);cursor:pointer;border-radius:4px;font-weight:800}

/* BUCKETS */
.bg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.bc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}
.bc-head{padding:12px;background:var(--sf2);border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.bc-title{font-weight:800;font-size:13px}
.bc-body{padding:12px}
.bc-row{display:flex;justify-content:space-between;padding:4px 0;font-size:11px;border-bottom:1px solid var(--sf2)}
.bc-row:last-child{border:none}

/* ELITE TAG */
.tag-elite{background:var(--pu-l);color:var(--pu);border:1px solid #ddd6fe;font-size:8.5px;padding:1px 5px;border-radius:3px;font-weight:800;margin-left:4px}
</style>
</head>
<body>

<div class="nav">
  <div class="nav-logo">POLYMARKET <span>PULSE v2</span></div>
  <div class="nav-tabs">
    <button class="nt on" onclick="sw('strategies',this)">Strategies</button>
    <button class="nt" onclick="sw('calendar',this)">Calendar</button>
    <button class="nt" onclick="sw('wallets',this)">Wallets</button>
    <button class="nt" onclick="sw('buckets',this)">Buckets</button>
  </div>
  <div class="nav-r">
    <div class="live-badge"><div class="live-dot"></div> LIVE</div>
  </div>
</div>

<div class="pbar-wrap"><div class="pbar" id="prog"></div></div>

<div class="content">
  <!-- STATUS BAR -->
  <div class="status-bar">
    <div class="stxt" id="status">Initializing intelligence engine...</div>
    <div class="kpis">
      <div class="kpi"><div class="kv" id="k-r">—</div><div class="kl">Rounds</div></div>
      <div class="kpi"><div class="kv" id="k-s">—</div><div class="kl">Strats</div></div>
      <div class="kpi"><div class="kv" id="k-b">—</div><div class="kl">Best WR</div></div>
    </div>
  </div>

  <!-- STRATEGIES -->
  <div class="sec on" id="tab-strategies">
    <div class="tb">
      <span class="tbl">Filter:</span>
      <button class="btn on" onclick="sf(null,this)">All</button>
      <button class="btn" onclick="sf('vol',this)">Volume</button>
      <button class="btn" onclick="sf('price',this)">Price</button>
      <button class="btn" onclick="sf('wallet',this)">Wallet</button>
      <button class="btn" onclick="sf('streak',this)">Streak</button>
      <button class="btn" onclick="sf('pattern',this)">Pattern</button>
      <span class="tbl" style="margin-left:12px">Sort:</span>
      <button class="btn on" onclick="ss('wr',this)">Win Rate ↓</button>
      <button class="btn" onclick="ss('sig',this)">Signals</button>
      <button class="btn" onclick="ss('name',this)">Name</button>
    </div>
    <div class="sg" id="strat-grid"></div>
  </div>

  <!-- CALENDAR -->
  <div class="sec" id="tab-calendar">
    <div class="cal-wrap">
      <div class="cal-h">
        <div class="cal-title" id="cal-title">Month Year</div>
        <div class="cal-nav">
          <button class="btn" onclick="calNav(-1)">Prev</button>
          <button class="btn" onclick="calNav(0)">Today</button>
          <button class="btn" onclick="calNav(1)">Next</button>
        </div>
      </div>
      <div class="cal-grid-wrap">
        <div class="cal-sidebar">
          <div class="cal-sb-h">Overlay Strategy</div>
          <div class="cal-sb-search"><input type="text" placeholder="Search strategies..." oninput="filterSidebar(this.value)"></div>
          <div class="cal-sb-list" id="sb-list"></div>
          <div style="padding:12px;border-top:1px solid var(--bd);background:var(--sf);font-size:11px;font-weight:700" id="sb-active-wr"></div>
        </div>
        <div class="cal-main">
          <div class="cal-days">
            <div class="cal-day-label">Sun</div><div class="cal-day-label">Mon</div><div class="cal-day-label">Tue</div>
            <div class="cal-day-label">Wed</div><div class="cal-day-label">Thu</div><div class="cal-day-label">Fri</div>
            <div class="cal-day-label">Sat</div>
          </div>
          <div class="cal-cells" id="cal-cells"></div>
        </div>
      </div>
      <div id="day-panel"></div>
    </div>
  </div>

  <!-- WALLETS -->
  <div class="sec" id="tab-wallets">
    <div class="tb">
      <span class="tbl">Filter:</span>
      <button class="btn" id="btn-elite" onclick="wEliteOnly=!wEliteOnly;this.classList.toggle('on');renderWallets()">Elite Retail (<$20k Portfolio)</button>
      <span class="tbl" style="margin-left:12px">Price Range:</span>
      <button class="btn on" onclick="wp(0,1,this)">All</button>
      <button class="btn" onclick="wp(.5,.6,this)">50-60¢</button>
      <button class="btn" onclick="wp(.6,.7,this)">60-70¢</button>
      <button class="btn" onclick="wp(.7,1,this)">70¢+</button>
      <span class="tbl" style="margin-left:12px">Min Rounds:</span>
      <button class="btn on" onclick="wmr(3,this)">3+</button>
      <button class="btn" onclick="wmr(5,this)">5+</button>
      <span class="tbl" style="margin-left:12px">Sort:</span>
      <button class="btn on" onclick="ws('wr',this)">Win Rate</button>
      <button class="btn" onclick="ws('pnl',this)">PnL</button>
      <button class="btn" onclick="ws('port',this)">Portfolio Val</button>
    </div>
    <div class="table-wrap"><table>
      <thead><tr>
        <th>#</th><th>Wallet / Name</th><th onclick="ws('wr')">Win Rate</th><th onclick="ws('port')">Portfolio</th>
        <th onclick="ws('pnl')">Est. PnL</th><th>Rounds</th><th>Entry Timing</th>
        <th>Late WR</th><th>Type</th>
      </tr></thead>
      <tbody id="wtbody"></tbody>
    </table></div>
  </div>

  <!-- BUCKETS -->
  <div class="sec" id="tab-buckets">
    <div class="bg-grid" id="bucket-grid"></div>
  </div>
</div>

<script>
const RAILWAY_API='https://pp-pulse-api-production.up.railway.app';
const DA='https://data-api.polymarket.com',GA='https://gamma-api.polymarket.com';

let G={wallets:{},rounds:[],strats:[],calRounds:[]};
let calY=new Date().getFullYear(),calM=new Date().getMonth();
let selDay=null,selStratId=null;
let stratSort='wr',stratFilter=null,expId=null;
let wPriceMin=0,wPriceMax=1,wMinR=3,wSort='wr',wEliteOnly=false;

// ── 95 STRATEGIES ──────────────────────────────────────────────────────────────
const STRATS=[
// VOLUME (9)
{id:'v1',name:'Volume Dom. 80%',tags:['vol'],desc:'Side with >80% of buy volume.',why:'Overwhelming dominance = near-certain direction.',sig:r=>{const t=r.uV+r.dV;if(t<50)return null;if(r.uV/t>.80)return'UP';if(r.dV/t>.80)return'DOWN';return null}},
{id:'v2',name:'Volume Dom. 70%',tags:['vol'],desc:'Side with >70% of buy volume.',why:'Strong momentum above noise floor.',sig:r=>{const t=r.uV+r.dV;if(t<50)return null;if(r.uV/t>.70)return'UP';if(r.dV/t>.70)return'DOWN';return null}},
{id:'v3',name:'Volume Dom. 60%',tags:['vol'],desc:'Side with >60% of buy volume.',why:'Looser threshold — more signals.',sig:r=>{const t=r.uV+r.dV;if(t<40)return null;if(r.uV/t>.60)return'UP';if(r.dV/t>.60)return'DOWN';return null}},
{id:'v4',name:'Late Surge 60s',tags:['vol'],desc:'>65% of final 60s buy volume on one side.',why:'Late capital is most informed.',sig:r=>{const t=r.lU+r.lD;if(t<20)return null;if(r.lU/t>.65)return'UP';if(r.lD/t>.65)return'DOWN';return null}},
{id:'v5',name:'Late Surge 30s',tags:['vol'],desc:'>60% of final 30s volume. Highest conviction.',why:'Last 30s entrants have near-oracle timing.',sig:r=>{const t=r.vlU+r.vlD;if(t<10)return null;if(r.vlU/t>.60)return'UP';if(r.vlD/t>.60)return'DOWN';return null}},

// ── ENGINE ─────────────────────────────────────────────────────────────────────
async function buildWallets(evs){
  const W={};let done=0;
  await Promise.all(evs.map(async ev=>{
    try{
      let oc=null;const a=JSON.parse(ev.markets?.[0]?.outcomePrices||'[]');
      if(parseFloat(a[0])>.9)oc='UP';else if(parseFloat(a[1])>.9)oc='DOWN';
      if(!oc)return;
      const uP=parseFloat(a[0])||.5,slug=ev.slug,rTs=parseInt(slug.split('-').pop())||0,t60=(rTs+300)-60;
      const trades=await fetch(`${DA}/trades?market=${slug}&limit=400&_=${Date.now()}`).then(r=>r.json()).catch(()=>[]);
      if(!Array.isArray(trades))return;
      trades.filter(t=>{const o=(t.outcome||'').toLowerCase();return o==='up'||o==='down';}).filter(t=>t.side==='BUY').forEach(t=>{
        const addr=t.proxyWallet||'';if(!addr)return;
        if(!W[addr])W[addr]={addr,name:t.name||t.pseudonym||'',wins:0,losses:0,rounds:0,vol:0,maxSize:0,pnl:0,timings:[],lateVol:0,lateWins:0,lateR:0,sizes:[],byPrice:{}};
        const w=W[addr],vol=t.size||0,isUp=(t.outcome||'').toLowerCase()==='up',won=(isUp?'UP':'DOWN')===oc,ts=t.timestamp||0;
        w.rounds++;w.vol+=vol;w.maxSize=Math.max(w.maxSize,vol);w.sizes.push(vol);
        if(won){w.wins++;w.pnl+=vol*(1/(t.price||.5)-1);}else{w.losses++;w.pnl-=vol;}
        w.timings.push(ts-rTs);
        if(ts>=t60){w.lateVol+=vol;w.lateR++;if(won)w.lateWins+=vol;}
        const bk=uP<.5?'<50':uP<.6?'50-60':uP<.7?'60-70':uP<.8?'70-80':uP<.9?'80-90':'90+';
        if(!w.byPrice[bk])w.byPrice[bk]={wins:0,losses:0};
        if(won)w.byPrice[bk].wins++;else w.byPrice[bk].losses++;
      });
    }catch{}
    done++;setP(done/evs.length*40);
  }));
  Object.values(W).forEach(w=>{
    const tot=w.wins+w.losses;
    w.wr=tot>0?Math.round(w.wins/tot*100):0;
    w.avgSize=w.rounds>0?w.vol/w.rounds:0;
    w.avgTiming=w.timings.length?Math.round(w.timings.reduce((a,b)=>a+b,0)/w.timings.length):0;
    w.lateWr=w.lateR>0?Math.round(w.lateWins/w.lateVol*100||0):0;
  });
  return W;
}

async function fetchRound(ev,W,rk){
  try{
    let oc=null;const a=JSON.parse(ev.markets?.[0]?.outcomePrices||'[]');
    if(parseFloat(a[0])>.9)oc='UP';else if(parseFloat(a[1])>.9)oc='DOWN';
    if(!oc)return null;
    const uP=parseFloat(a[0])||.5,slug=ev.slug,rTs=parseInt(slug.split('-').pop())||0,rEnd=rTs+300;
    const t60=rEnd-60,t30=rEnd-30,t45=rTs+45,t90=rTs+90,t210=rTs+210;
    const trades=await fetch(`${DA}/trades?market=${slug}&limit=400&_=${Date.now()}`).then(r=>r.json()).catch(()=>[]);
    if(!Array.isArray(trades))return null;
    const valid=trades.filter(t=>{const o=(t.outcome||'').toLowerCase();return o==='up'||o==='down';});
    
    // Aggregates
    let uV=0,dV=0,lU=0,lD=0,vlU=0,vlD=0,sU=0,sD=0,earlyU=0,earlyD=0;
    let t10U=0,t10D=0,t20U=0,t20D=0,p10U=0,p10D=0,p20U=0,p20D=0;
    let orU=0,orD=0,wCntU=0,wCntD=0,mU=0,mD=0,midU=0,midD=0,scalU=0,scalD=0,excU=0,excD=0,newU=0,newD=0;
    const uwsU=new Set(),uwsD=new Set();

    const top10WR=Object.values(W).sort((a,b)=>b.wr-a.wr).slice(0,10).map(x=>x.addr);
    const top20WR=Object.values(W).sort((a,b)=>b.wr-a.wr).slice(0,20).map(x=>x.addr);
    const top10PnL=Object.values(W).sort((a,b)=>b.pnl-a.pnl).slice(0,10).map(x=>x.addr);
    const top20PnL=Object.values(W).sort((a,b)=>b.pnl-a.pnl).slice(0,20).map(x=>x.addr);
    const oracles=Object.values(W).filter(w=>w.lateWr>=70&&w.lateR>=3).map(x=>x.addr);
    const manip=Object.values(W).filter(w=>w.avgTiming<60&&w.wr>=55).map(x=>x.addr);

    valid.forEach(t=>{
      const vol=t.size||0,isU=(t.outcome||'').toLowerCase()==='up',ts=t.timestamp||0,addr=t.proxyWallet||'';
      if(isU){uV+=vol;uwsU.add(addr);if(ts>=t60)lU+=vol;if(ts>=t30)vlU+=vol;if(vol<20)sU+=vol;if(ts<=t45)earlyU+=vol;}
      else{dV+=vol;uwsD.add(addr);if(ts>=t60)lD+=vol;if(ts>=t30)vlD+=vol;if(vol<20)sD+=vol;if(ts<=t45)earlyD+=vol;}
      
      if(top10WR.includes(addr)){if(isU)t10U+=vol;else t10D+=vol;}
      if(top20WR.includes(addr)){if(isU)t20U+=vol;else t20D+=vol;}
      if(top10PnL.includes(addr)){if(isU)p10U+=vol;else p10D+=vol;}
      if(top20PnL.includes(addr)){if(isU)p20U+=vol;else p20D+=vol;}
      if(oracles.includes(addr)){if(isU)orU++;else orD++;}
      if(vol>=500){if(isU)wCntU++;else wCntD++;}
      if(manip.includes(addr)){if(isU)mU+=vol;else mD+=vol;}
      if(ts>=t90&&ts<=t210){if(isU)midU+=vol;else midD+=vol;}
      const w=W[addr];if(w&&vol>w.avgSize*2){if(isU)scalU++;else scalD++;}
      if(ts>=t60&&w&&w.wr>=60){if(isU)excU++;else excD++;}
      if(w&&w.rounds<3){if(isU)newU+=vol;else newD+=vol;}
    });

    return {slug,oc,uP,ts:rTs,date:new Date(rTs*1000),uV,dV,lU,lD,vlU,vlD,sU,sD,earlyU,earlyD,t10U,t10D,t20U,t20D,p10U,p10D,p20U,p20D,orU,orD,wCntU,wCntD,mU,mD,midU,midD,scalU,scalD,excU,excD,newU,newD,uwU:uwsU.size,uwD:uwsD.size};
  }catch{return null;}
}

// ── PORTFOLIO TRACKER ────────────────────────────────────────────────────────
async function fetchPortfolios(wallets) {
  const candidates = Object.values(wallets)
    .filter(w => w.rounds >= 3 && w.wr >= 55)
    .sort((a, b) => b.wr - a.wr)
    .slice(0, 80);
  
  let done = 0;
  await Promise.all(candidates.map(async w => {
    try {
      const resp = await fetch(`${DA}/value?user=${w.addr}`);
      if (resp.ok) {
        const data = await resp.json();
        w.portfolio = data.value || 0;
      }
    } catch(e) {}
    done++;
    setStatus(`Elite retail sync: ${Math.round(done/candidates.length*100)}%`);
  }));
}

// ── INITIALIZATION ────────────────────────────────────────────────────────────
async function init(){
  setStatus('Loading intelligence engine...');setP(0);

  // 1. Historical rounds from DB
  setStatus('Syncing history from Railway...');setP(5);
  const dbRows=await fetch(`${RAILWAY_API}/rounds`).then(r=>r.ok?r.json():[]).catch(()=>[]);
  G.calRounds=dbRows.map(r=>({slug:r.slug,oc:r.outcome,uP:parseFloat(r.upP)||.5,ts:parseInt(r.ts)||0,date:new Date(r.date)})).filter(r=>r.oc==='UP'||r.oc==='DOWN');

  // 2. Live rounds from Polymarket
  setStatus('Fetching live rounds...');setP(10);
  const liveEvs=await fetch(`${GA}/events?series_slug=btc-up-or-down-5m&limit=500&order=endDate&ascending=false`).then(r=>r.json()).catch(()=>[]);
  const liveRes=(Array.isArray(liveEvs)?liveEvs:[]).filter(ev=>{try{const m=ev.markets?.[0];if(!m||!m.closed)return false;const a=JSON.parse(m.outcomePrices||'[]');return parseFloat(a[0])>.9||parseFloat(a[1])>.9;}catch{return false;}}).slice(0,100);

  // 3. Build wallets & live round metrics
  setStatus('Analyzing whale wallets & patterns...');
  const wc=await buildWallets(liveRes);
  G.wallets=wc;

  const rounds=[];
  for(let i=0;i<liveRes.length;i++){
    const r=await fetchRound(liveRes[i],wc,i);
    if(r)rounds.push(r);
    setP(40 + (i/liveRes.length*40));
  }
  G.rounds=rounds.sort((a,b)=>a.ts-b.ts);

  // 4. Elite Retail sync
  setStatus('Filtering elite retail holders (<$20k)...');
  await fetchPortfolios(wc);

  // 5. Run strategies
  setStatus('Running 95 predictive signals...');setP(82);
  const fullH=G.calRounds,liveH=G.rounds,liveOuts=liveH.map(x=>x.oc);
  
  G.strats=STRATS.map(st=>{
    const hT=[];
    fullH.forEach((r,i)=>{
      const prev=fullH.slice(0,i).map(x=>x.oc),prevR=fullH.slice(0,i);
      const sig=st.sig(r,prev,prevR);
      if(sig)hT.push({oc:r.oc,sig,res:sig===r.oc?'win':'loss'});
    });
    const hW=hT.filter(t=>t.res==='win').length,hWR=hT.length?Math.round(hW/hT.length*100):0;

    const liveT=[];
    liveH.forEach((r,i)=>{
      const prev=liveOuts.slice(0,i),prevR=liveH.slice(0,i);
      const sig=st.sig(r,prev,prevR);
      const result=sig===null?'skip':sig===r.oc?'win':'loss';
      liveT.push({time:r.date.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),date:r.date,sig,oc:r.oc,result,uP:r.uP});
    });
    const lS=liveT.filter(t=>t.result!=='skip'),lW=lS.filter(t=>t.result==='win').length,lWR=lS.length?Math.round(lW/lS.length*100):0;
    return{...st,trades:liveT,wins:lW,losses:lS.length-lW,signals:lS.length,wr:lWR,hWR,hC:hT.length,tier:lWR>=75?'S':lWR>=62?'A':lWR>=50?'B':'C'};
  });

  const best=Math.max(...G.strats.map(s=>s.wr));
  document.getElementById('k-b').textContent=best+'%';
  document.getElementById('k-s').textContent=G.strats.length;
  document.getElementById('k-r').textContent=G.calRounds.length||liveRes.length;
  setP(100);
  setStatus(`✅ ${fullH.length} history · ${liveRes.length} live · ${Object.keys(wc).length} wallets · ${G.strats.length} strats`);
  renderStrategies();renderWallets();renderCalendar();buildCalSidebar();renderBuckets();
}

// ── WALLETS ───────────────────────────────────────────────────────────────────
function wp(min,max,b){wPriceMin=min;wPriceMax=max;if(b){document.querySelectorAll('#tab-wallets .btn').forEach(x=>x.classList.remove('on'));b.classList.add('on');}renderWallets();}
function wmr(n,b){wMinR=n;if(b){document.querySelectorAll('#tab-wallets .btn').forEach(x=>{if(x.textContent.includes('+'))x.classList.remove('on');});b.classList.add('on');}renderWallets();}
function ws(k,b){wSort=k;if(b){document.querySelectorAll('#tab-wallets .btn').forEach(x=>{if(['Win Rate','PnL','Portfolio Val'].includes(x.textContent))x.classList.remove('on');});b.classList.add('on');}renderWallets();}

function renderWallets(){
  let data=Object.values(G.wallets).filter(w=>w.rounds>=wMinR);
  
  if(wEliteOnly){
    data=data.filter(w=>w.portfolio!==undefined && w.portfolio>0 && w.portfolio<20000 && w.wr>=60);
  }

  if(wPriceMin>0||wPriceMax<1){
    const bk=wPriceMax<=.5?'<50':wPriceMax<=.6?'50-60':wPriceMax<=.7?'60-70':wPriceMax<=.8?'70-80':wPriceMax<=.9?'80-90':'90+';
    data=data.filter(w=>{const b=w.byPrice[bk];return b&&(b.wins+b.losses)>=2;});
  }

  if(wSort==='wr')data.sort((a,b)=>b.wr-a.wr);
  else if(wSort==='pnl')data.sort((a,b)=>b.pnl-a.pnl);
  else if(wSort==='port')data.sort((a,b)=>(b.portfolio||0)-(a.portfolio||0));
  
  data=data.slice(0,100);
  const tb=document.getElementById('wtbody');tb.innerHTML='';
  data.forEach((w,i)=>{
    const dWR=w.wr,pCol=w.pnl>0?'var(--up)':'var(--dn)';
    const tLbl=w.avgTiming<60?'⚡ Early':w.avgTiming<180?'— Mid':'🎯 Late';
    const tCol=w.avgTiming>180?'var(--up)':w.avgTiming<60?'var(--dn)':'var(--tx2)';
    const name=w.name||w.addr.slice(0,6)+'…'+w.addr.slice(-4);
    const isElite=w.portfolio!==undefined && w.portfolio<20000 && w.wr>=60;
    const typeLbl=isElite?`<span class="tag-elite">ELITE RETAIL</span>`:w.lateWr>=70?'🔮 Oracle':w.avgTiming<60?'⚠️ Manip':'👤';
    
    const tr=document.createElement('tr');
    tr.innerHTML=`<td class="mono" style="color:var(--tx3)">${i+1}</td>
      <td><span class="waddr" onclick="window.open('https://polymarket.com/profile/${w.addr}','_blank')">${name}</span></td>
      <td class="mono" style="color:${dWR>=60?'var(--up)':'var(--tx2)'};font-weight:700">${dWR}%</td>
      <td class="mono">$${w.portfolio!==undefined?Math.round(w.portfolio).toLocaleString():'—'}</td>
      <td class="mono" style="color:${pCol};font-weight:600">${w.pnl>0?'+':''}$${Math.round(w.pnl).toLocaleString()}</td>
      <td class="mono">${w.rounds}</td>
      <td style="color:${tCol}">${tLbl} <span style="font-family:var(--mono);font-size:9px;color:var(--tx3)">${w.avgTiming}s</span></td>
      <td class="mono" style="color:${w.lateWr>=65?'var(--up)':'var(--tx3)'}">${w.lateR>0?w.lateWr+'%':'—'}</td>
      <td>${typeLbl}</td>`;
    tb.appendChild(tr);
  });
}

// ── OTHER UI FUNCTIONS ────────────────────────────────────────────────────────
function sf(f,b){stratFilter=f;if(b){document.querySelectorAll('#tab-strategies .btn').forEach(x=>{if(!x.textContent.includes('Rate')&&!x.textContent.includes('Signals')&&!x.textContent.includes('Name'))x.classList.remove('on');});b.classList.add('on');}renderStrategies();}
function ss(k,b){stratSort=k;if(b){document.querySelectorAll('#tab-strategies .btn').forEach(x=>{if(x.textContent.includes('Rate')||x.textContent.includes('Signals')||x.textContent.includes('Name'))x.classList.remove('on');});b.classList.add('on');}renderStrategies();}

function renderStrategies(){
  let data=[...G.strats];
  if(stratFilter)data=data.filter(s=>s.tags.includes(stratFilter));
  if(stratSort==='wr')data.sort((a,b)=>b.wr-a.wr||b.signals-a.signals);
  else if(stratSort==='sig')data.sort((a,b)=>b.signals-a.signals);
  else data.sort((a,b)=>a.name.localeCompare(b.name));
  const g=document.getElementById('strat-grid');g.innerHTML='';
  data.forEach(s=>{
    const col=s.wr>=75?'var(--go)':s.wr>=62?'var(--up)':s.wr>=50?'var(--bl)':'var(--tx3)';
    const c=document.createElement('div');c.className='sc'+(expId===s.id?' open':'');c.dataset.id=s.id;
    c.innerHTML=`<div class="sch"><span class="sc-tier t${s.tier}">${s.tier}</span><div class="sc-m"><div class="sc-n">${s.name}</div><div class="sc-tags">${s.tags.map(t=>`<span class="tag tv">${t}</span>`).join('')}</div></div><div class="sc-r"><div class="sc-wr" style="color:${col}">${s.signals?s.wr+'%':''} <small style="font-size:9px;opacity:0.6;display:block">Hist: ${s.hWR}%</small></div><div class="sc-wl">${s.wins}W·${s.losses}L·${s.signals}</div></div></div><div class="sc-bar"><div class="sc-fill" style="width:${s.wr}%;background:${col}"></div></div><div class="sc-desc">${s.desc}</div><div class="sc-why">${s.why}</div>`;
    c.addEventListener('click',()=>{expId=expId===s.id?null:s.id;renderStrategies();});
    g.appendChild(c);
  });
}

function buildCalSidebar(){
  const list=document.getElementById('sb-list');list.innerHTML='';
  const none=document.createElement('div');none.className='cal-sb-item on';none.dataset.id='none';none.innerHTML=`<div class="cal-sb-dot" style="background:var(--bd2)"></div><span>Show All Outcomes</span>`;
  none.addEventListener('click',()=>selectCalStrat(null));list.appendChild(none);
  const order=['vol','price','wallet','onchain','streak','time'];
  order.forEach(tag=>{
    const items=G.strats.filter(s=>s.tags.includes(tag));if(!items.length)return;
    const grp=document.createElement('div');grp.className='cal-sb-group';grp.textContent=tag.toUpperCase();list.appendChild(grp);
    items.forEach(s=>{
      const col=s.wr>=75?'var(--go)':s.wr>=62?'var(--up)':s.wr>=50?'var(--bl)':'var(--tx3)';
      const el=document.createElement('div');el.className='cal-sb-item';el.dataset.id=s.id;
      el.innerHTML=`<div class="cal-sb-dot" style="background:${col}"></div><span>${s.name}</span><span class="cal-sb-wr" style="color:${col}">${s.wr}%</span>`;
      el.addEventListener('click',()=>selectCalStrat(s.id));list.appendChild(el);
    });
  });
}
function selectCalStrat(id){selStratId=id;document.querySelectorAll('.cal-sb-item').forEach(el=>el.classList.toggle('on',el.dataset.id===(id||'none')));renderCalendar();}
function filterSidebar(q){document.querySelectorAll('.cal-sb-item').forEach(el=>{const text=el.textContent.toLowerCase();el.style.display=!q||text.includes(q.toLowerCase())?'flex':'none';});}

function calNav(d){if(d===0){calY=new Date().getFullYear();calM=new Date().getMonth();}else{calM+=d;if(calM>11){calM=0;calY++;}if(calM<0){calM=11;calY--;}}renderCalendar();}
function renderCalendar(){
  const mNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('cal-title').textContent=`${mNames[calM]} ${calY}`;
  const dayMap={};const calData=G.calRounds.length?G.calRounds:G.rounds;
  calData.forEach(r=>{const d=r.date;if(d.getFullYear()===calY&&d.getMonth()===calM){const k=d.getDate();if(!dayMap[k])dayMap[k]=[];dayMap[k].push(r);}});
  let stratDayMap=null;
  if(selStratId){
    const s=G.strats.find(x=>x.id===selStratId);
    if(s){stratDayMap={};s.trades.forEach(t=>{const d=t.date;if(d&&d.getFullYear()===calY&&d.getMonth()===calM){const k=d.getDate();if(!stratDayMap[k])stratDayMap[k]={wins:0,losses:0};if(t.result==='win')stratDayMap[k].wins++;else if(t.result==='loss')stratDayMap[k].losses++;}});}
  }
  const cells=document.getElementById('cal-cells');cells.innerHTML='';
  const firstDay=new Date(calY,calM,1).getDay(),daysInMonth=new Date(calY,calM+1,0).getDate();
  for(let i=0;i<firstDay;i++)cells.appendChild(document.createElement('div')).className='cc empty';
  for(let day=1;day<=daysInMonth;day++){
    const rounds=dayMap[day]||[],upW=rounds.filter(r=>r.oc==='UP').length,dnW=rounds.filter(r=>r.oc==='DOWN').length,sd=stratDayMap?stratDayMap[day]:null;
    const el=document.createElement('div');el.className='cc'+(selDay===day?' sel':'')+(rounds.length===0?' no-data':'');
    let html=`<div class="cc-day">${day}</div>`;
    if(rounds.length){
      html+=`<div class="cc-bars"><div class="cc-bar-up" style="flex:${upW}"></div><div class="cc-bar-dn" style="flex:${dnW}"></div></div>`;
      html+=`<div class="cc-rounds">${rounds.slice(0,10).map(r=>`<div class="cc-r ${r.oc.toLowerCase()}"></div>`).join('')}</div>`;
      html+=`<div class="cc-stats">↑${upW} ↓${dnW}</div>`;
    }
    if(sd){
      const wr=Math.round(sd.wins/(sd.wins+sd.losses)*100)||0;
      html+=`<div class="cc-strat ${wr>=50?'s-win':'s-loss'}">${wr}%</div>`;
    }
    el.innerHTML=html;el.onclick=()=>{selDay=day;renderCalendar();renderDayDetail(day,rounds,sd);};
    cells.appendChild(el);
  }
}

function renderDayDetail(day,rounds,sd){
  const panel=document.getElementById('day-panel');
  const upW=rounds.filter(r=>r.oc==='UP').length,dnW=rounds.filter(r=>r.oc==='DOWN').length;
  let html=`<div class="day-panel">
    <div class="dp-head"><div class="dp-title">${day} ${calM+1} ${calY}</div><div class="dp-summary">
      <div class="dp-stat"><div class="dp-sv">${rounds.length}</div><div class="dp-sl">Rounds</div></div>
      <div class="dp-stat"><div class="dp-sv" style="color:var(--up)">${upW}</div><div class="dp-sl">UP</div></div>
      <div class="dp-stat"><div class="dp-sv" style="color:var(--dn)">${dnW}</div><div class="dp-sl">DOWN</div></div>
    </div><button class="dp-close" onclick="selDay=null;renderCalendar();document.getElementById('day-panel').innerHTML=''">✕</button></div>
    <div class="dp-rounds">${rounds.map(r=>`<div class="dp-round dpr-${r.oc.toLowerCase()}"><span>${r.date.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span><span>↑${Math.round(r.uP*100)}¢</span></div>`).join('')}</div>
  </div>`;
  panel.innerHTML=html;
}

function renderBuckets(){
  const bkts=[{l:'UP 50-60¢',min:.5,max:.6},{l:'UP 60-70¢',min:.6,max:.7},{l:'UP 70-80¢',min:.7,max:.8},{l:'UP 80-90¢',min:.8,max:.9},{l:'UP <50¢',min:0,max:.5}];
  const g=document.getElementById('bucket-grid');g.innerHTML='';
  bkts.forEach(b=>{
    const rs=G.rounds.filter(r=>r.uP>=b.min&&r.uP<b.max);if(!rs.length)return;
    const uW=rs.filter(r=>r.oc==='UP').length,dW=rs.filter(r=>r.oc==='DOWN').length;
    const c=document.createElement('div');c.className='bc';
    c.innerHTML=`<div class="bc-head"><div class="bc-title">${b.l}</div><div>${rs.length}r</div></div><div class="bc-body">
      <div style="display:flex;gap:8px;margin-bottom:10px">
        <div style="flex:1;text-align:center"><div style="font-weight:700;color:var(--up)">${Math.round(uW/rs.length*100)}%</div><div style="font-size:9px">UP</div></div>
        <div style="flex:1;text-align:center"><div style="font-weight:700;color:var(--dn)">${Math.round(dW/rs.length*100)}%</div><div style="font-size:9px">DOWN</div></div>
      </div>
    </div>`;
    g.appendChild(c);
  });
}

function sw(id,btn){document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));document.querySelectorAll('.nt').forEach(t=>t.classList.remove('on'));document.getElementById('tab-'+id).classList.add('on');btn.classList.add('on');if(id==='calendar')renderCalendar();if(id==='buckets')renderBuckets();if(id==='wallets')renderWallets();}
function setStatus(t){document.getElementById('status').textContent=t;}
function setP(p){document.getElementById('prog').style.width=p+'%';}

window.addEventListener('load',init);
</script>
